<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>NOCTIS - 月相命運核對終端</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --purple: #b86bff; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .checker-card {
            max-width: 500px; width: 90%; background: #161616; padding: 40px; 
            border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 30px; }

        .input-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .num-in { 
            background: #000; border: 1px solid #333; color: #fff; height: 60px;
            font-size: 1.5rem; border-radius: 8px; text-align: center;
            font-family: 'Courier New', monospace; transition: 0.3s;
        }
        .num-in:focus { border-color: var(--purple); box-shadow: 0 0 15px rgba(184, 107, 255, 0.3); outline: none; }

        .check-btn {
            width: 100%; padding: 18px; background: var(--gold); color: #000; 
            font-weight: bold; border: none; cursor: pointer; border-radius: 8px;
            font-family: 'Cinzel'; font-size: 1.1rem; transition: 0.3s;
        }
        .check-btn:hover { background: #fff; transform: translateY(-3px); }

        /* 結果顯示區 */
        #result-area { margin-top: 30px; padding: 25px; border-radius: 8px; display: none; background: rgba(0,0,0,0.3); animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .prize-title { font-family: 'Cinzel'; font-size: 1.8rem; margin-bottom: 10px; }
        .prize-amount { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; }
        .match-detail { font-size: 0.85rem; color: #666; border-top: 1px solid #333; pt: 15px; margin-top: 15px; }
        /* 修改為 6 格一行 */
.input-wrapper { 
    display: flex; 
    justify-content: space-between; 
    gap: 8px; 
    margin-bottom: 30px; 
}
.num-in { 
    background: #000; border: 1px solid #333; color: #fff; 
    flex: 1; height: 50px; /* 寬度自適應 */
    font-size: 1.2rem; border-radius: 6px; text-align: center;
    font-family: 'Courier New', monospace; transition: 0.3s;
    min-width: 0; /* 防止溢出 */
}

/* 禁用狀態的按鈕樣式 */
.check-btn:disabled {
    background: #555 !important;
    color: #888 !important;
    cursor: not-allowed;
    transform: none !important;
}
    </style>
</head>
<body>

<div class="checker-card">
    <div class="logo">NOCTIS</div>
    <div class="subtitle">月相觀測自助核對系統</div>
    <div class="subtitle">請輸入兩位數字，如號碼為1請輸入01</div>

    <div class="input-wrapper">
        <input type="number" class="num-in" placeholder="一" min="1" max="24">
        <input type="number" class="num-in" placeholder="二" min="1" max="24">
        <input type="number" class="num-in" placeholder="三" min="1" max="24">
        <input type="number" class="num-in" placeholder="四" min="1" max="24">
        <input type="number" class="num-in" placeholder="五" min="1" max="24">
        <input type="number" class="num-in" placeholder="六" min="1" max="24">
    </div>

    <button class="check-btn" onclick="runCheck()">揭曉觀測結果 (REVEAL FATE)</button>

    <div id="result-area">
        <div id="prize-text" class="prize-title"></div>
        <div id="amount-text" class="prize-amount"></div>
        <div id="detail-text" class="match-detail"></div>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwudPjnrQzKMKsIHrvm0boqptRyVSfoZDF0aGbZw4ksZqknpuxfYDGCD4AyRMEb21TdhQ/exec"; 

// 頁面初始化：增加自動跳格功能
document.querySelectorAll('.num-in').forEach((input, index, arr) => {
    input.addEventListener('input', (e) => {
        // 如果輸入兩位數，自動跳下一格
        if (e.target.value.length >= 2 && index < arr.length - 1) {
            arr[index + 1].focus();
        }
    });
});

async function runCheck() {
    const btn = document.querySelector('.check-btn');
    const inputs = document.querySelectorAll('.num-in');
    
    // 1. 取得並格式化數字 (自動補零)
    const userNums = Array.from(inputs).map(i => {
        let val = i.value.trim();
        return val ? val.padStart(2, '0') : "";
    });
    
    // 2. 驗證輸入
    if (userNums.some(n => n === "" || n < 1 || n > 24) || new Set(userNums).size !== 6) {
        alert("請輸入 6 個不重複的 01-24 號碼組合");
        return;
    }

    // 3. 進入讀取狀態
    const originalBtnText = btn.innerText;
    btn.disabled = true;
    btn.innerText = "觀測中 (OBSERVING...)";
    
    const resArea = document.getElementById('result-area');
    resArea.style.display = 'block';
    resArea.innerHTML = `<div style="color: #d4af37; animation: pulse 1.5s infinite;">正在同步月相檔案...</div>`;

    try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        
        const winningNums = data.lastNumbers.map(n => n.trim().padStart(2, '0'));
        const specialNum = data.lastSpecial.trim().padStart(2, '0');
        
        const matched = userNums.filter(n => winningNums.includes(n)).length;
        const hasSpecial = userNums.includes(specialNum);

        let prize = "未中獎 (TRY AGAIN)";
        let amount = "期待下次的月相啟示";
        let color = "#666";

        // 判斷邏輯
        if (matched === 6) {
            prize = "✦ 頭 獎 (JACKPOT) ✦";
            amount = Number(data.jackpot).toLocaleString() + " Gil";
            color = "#d4af37";
        } else if (matched === 5 && hasSpecial) {
            prize = "二 獎 (SECOND PRIZE)";
            const second = Number(data.jackpot) * 0.5;
            amount = second.toLocaleString() + " Gil";
            color = "#b86bff";
        } else if (matched === 5) {
            prize = "三 獎 (THIRD PRIZE)";
            const third = Number(data.jackpot) * 0.1;
            amount = third.toLocaleString() + " Gil";
            color = "#fff";
        } else if (matched === 4 && hasSpecial) {
            prize = "四 獎";
            amount = "10,000 Gil";
            color = "#fff";
        } else if (matched === 3) {
            prize = "五 獎";
            amount = "2,000 Gil";
            color = "#fff";
        }

        // 更新結果顯示
        resArea.style.border = `1px solid ${color}`;
        resArea.innerHTML = `
            <div class="prize-title" style="color: ${color}">${prize}</div>
            <div class="prize-amount">${amount}</div>
            <div class="match-detail">匹配正字：${matched} | 特別號碼：${hasSpecial ? '✔' : '✘'}</div>
        `;

    } catch (e) {
        resArea.innerHTML = `<div style="color: #ff4d4d;">連線失敗，請聯繫櫃檯職員。</div>`;
    } finally {
        // 恢復按鈕狀態
        btn.disabled = false;
        btn.innerText = originalBtnText;
    }
}
</script>
</body>
</html>
